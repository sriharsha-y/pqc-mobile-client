name: ios

# PR-only — runs on macos-latest which costs 10× against the free quota,
# so we want this firing as rarely as possible while still catching
# breakage. release.yml builds iOS artifacts when a release is cut.
#
# paths-ignore: docs-only PRs don't need the iOS XCFramework pipeline.
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build-xcframework
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + iOS targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add \
            aarch64-apple-ios \
            aarch64-apple-ios-sim \
            x86_64-apple-ios

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ios

      # uniffi-bindgen is built as a binary target from this crate
      # (see Cargo.toml [[bin]]); the build script invokes it via
      # `cargo run --release --bin uniffi-bindgen`.

      - name: Build XCFramework + Swift bindings
        run: ./scripts/build-ios.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pqc-ios
          path: |
            generated/PqcCore.xcframework
            generated/swift/
          if-no-files-found: error
          retention-days: 14
