name: release

# Conventional-commits driven release workflow using release-please.
#
# Flow:
#   1. Commit to main with conventional-commit subject lines:
#        feat(client): add HTTP/3 support       → bumps minor (pre-1.0: patch unless bump-minor-pre-major)
#        fix(tls): handle malformed pin         → bumps patch
#        chore: bump deps                       → no version bump
#        feat!: drop iOS 14 support             → bumps major (or minor in 0.x with bump-minor-pre-major)
#   2. release-please opens / updates a release PR ("chore: release X.Y.Z") that:
#        - bumps version in Cargo.toml
#        - updates CHANGELOG.md (grouped by Features / Bug Fixes / etc.)
#   3. Merge that release PR. release-please then:
#        - creates git tag vX.Y.Z
#        - creates a GitHub Release whose body is the CHANGELOG entries for this version
#   4. The build-android, build-ios, and attach-assets jobs run conditionally
#      on `release_created`, attaching the AAR + XCFramework archives to the
#      newly-created release.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize release runs so concurrent merges to main don't race on tag
# creation. Don't cancel an in-progress release — its mid-state might be
# a partially-published release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write       # release-please creates tags/releases
  pull-requests: write  # release-please opens release PRs

env:
  CARGO_TERM_COLOR: always
  # iOS deployment-target floor — must match PqcCore.podspec's
  # `s.platform = :ios, '13.0'`. Pinning here (rather than relying on
  # build-ios.sh's `${IPHONEOS_DEPLOYMENT_TARGET:-13.0}` default) keeps
  # the contract in one place: bumping the floor requires changing this
  # workflow AND the podspec together.
  IPHONEOS_DEPLOYMENT_TARGET: "13.0"

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name:        ${{ steps.rp.outputs.tag_name }}
      version:         ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          # Config-file mode (release-please-config.json +
          # .release-please-manifest.json). This is what release-please v4
          # expects natively and is required to use `extra-files`, which
          # is how we keep PqcCore.podspec's version in lockstep with
          # Cargo.toml. Without that, the podspec stays at whatever
          # version it was last manually bumped to, and `s.source { :tag
          # => s.version.to_s }` resolves to a stale git tag.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-android:
    name: build-android
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + Android targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-android

      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk
        # uniffi-bindgen built from this crate's [[bin]] target.

      - name: Resolve NDK path
        run: echo "ANDROID_NDK_HOME=${ANDROID_NDK_LATEST_HOME}" >> $GITHUB_ENV

      - name: Build
        run: ./scripts/build-android.sh

      - name: Package
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          ARCHIVE="pqc-mobile-client-${VERSION}-android.tar.gz"
          mkdir -p dist
          # Include android/libs/ — the rustls-platform-verifier Kotlin
          # glue jar that build-android.sh extracted out of the vendored
          # crate AAR. Tarball consumers (the "behind a corporate proxy /
          # no Maven Central" path) need it on their compile/runtime
          # classpath; without it they hit
          #   NoClassDefFoundError: org.rustls.platformverifier.CertificateVerifier
          # on the first handshake.
          tar -czf "dist/${ARCHIVE}" \
              -C target jniLibs \
              -C ../generated kotlin \
              -C ../android libs
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pqc-android
          path: dist/${{ env.ARCHIVE }}
          if-no-files-found: error
          retention-days: 7

      # Stash the raw native+bindings so publish-maven can consume them
      # without redoing the cargo-ndk cross-compile. Saves ~3 min of
      # redundant work on every release. Tarball avoids the brittle
      # upload-artifact v4 path-preservation semantics for nested dirs.
      #
      # Also stash android/libs/ — that's where build-android.sh extracts
      # the rustls-platform-verifier Kotlin glue jar so AGP can bundle
      # it into our AAR. publish-maven must see it at gradle-assemble
      # time or the published AAR loses those classes.
      - name: Bundle native libs + Kotlin bindings for downstream jobs
        run: tar -czf /tmp/android-native.tar.gz target/jniLibs generated/kotlin android/libs

      - name: Upload native + bindings (for publish-maven)
        uses: actions/upload-artifact@v4
        with:
          name: pqc-android-native
          path: /tmp/android-native.tar.gz
          if-no-files-found: error
          retention-days: 1

  build-ios:
    name: build-ios
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + iOS targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add \
            aarch64-apple-ios \
            aarch64-apple-ios-sim \
            x86_64-apple-ios

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-ios

      # uniffi-bindgen built from this crate's [[bin]] target.

      - name: Build
        run: ./scripts/build-ios.sh

      # Defense in depth: the `cli` cargo feature is supposed to keep
      # uniffi-bindgen + clap + goblin out of the iOS static archive. If
      # a future Cargo.toml edit, --all-features invocation, or workspace
      # addition accidentally re-activates the feature for the cross-
      # compile, the archive balloons from ~58 MB back to ~90 MB and
      # ships bloated assets. Grep the .a for telltale CLI symbols and
      # fail the release if any appear.
      - name: Guard against CLI-feature bloat regression
        run: |
          # Scan every slice in the xcframework, not just the device
          # slice. A target-conditional feature unification (e.g. via a
          # cfg(target_arch="x86_64") dev-dep) could leak CLI symbols
          # into the simulator slice only, leaving the device slice
          # clean — that would pass a device-only check and ship bloat
          # to every developer running on the simulator.
          shopt -s nullglob
          archives=(generated/PqcCore.xcframework/*/libpqc_client.a)
          if [ ${#archives[@]} -eq 0 ]; then
            echo "::error::No libpqc_client.a archives found under generated/PqcCore.xcframework/."
            exit 1
          fi
          # Assert both expected slices exist by name. Catches a silent
          # build regression where (e.g.) the simulator step in
          # scripts/build-ios.sh fails non-fatally and ships an iOS-only
          # asset — consumers on Apple Silicon Mac running SwiftUI
          # Previews then hit "no compatible slice" link errors.
          for required in ios-arm64 ios-arm64_x86_64-simulator; do
            if [ ! -f "generated/PqcCore.xcframework/${required}/libpqc_client.a" ]; then
              echo "::error::Expected slice generated/PqcCore.xcframework/${required}/libpqc_client.a is missing."
              echo "::error::Audit scripts/build-ios.sh — one of the cargo --target steps probably failed silently."
              exit 1
            fi
          done
          fail=0
          for AR in "${archives[@]}"; do
            if nm "$AR" 2>/dev/null | grep -qE "_clap_(builder|derive)|_goblin|_uniffi_bindgen_main"; then
              echo "::error::Slice $AR contains uniffi-bindgen CLI symbols (clap / goblin / uniffi_bindgen_main)."
              fail=1
            else
              echo "OK: no CLI symbols in $AR"
            fi
          done
          if [ $fail -ne 0 ]; then
            echo "::error::The 'cli' cargo feature appears to have leaked into the cross-compile."
            echo "Audit Cargo.toml's uniffi dep features and the build invocation in scripts/build-ios.sh."
            exit 1
          fi

      - name: Package
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          mkdir -p dist

          # Produce two iOS release zips:
          #
          # - PqcCore-X.Y.Z.zip: fat zip with PqcCore.xcframework +
          #   pqc.swift + LICENSE at top level. Consumed by
          #   PqcCore.podspec's :http source; the Swift binding +
          #   license sit alongside the framework so CocoaPods can
          #   pick them up directly from the Pod root.
          #
          # - PqcCore-X.Y.Z.xcframework.zip: slim zip with only
          #   PqcCore.xcframework. Consumed by SPM's binaryTarget;
          #   Apple's spec says "a ZIP archive that contains your
          #   XCFramework" — SPM currently tolerates siblings but the
          #   tolerance is implementation behaviour, not documented
          #   contract. Slim zip future-proofs against Apple ever
          #   enforcing single-item zips.
          ARCHIVE="PqcCore-${VERSION}.zip"
          SPM_ARCHIVE="PqcCore-${VERSION}.xcframework.zip"

          # TZ=UTC + zip -X strip variable timestamps and extra fields,
          # making the zip layer's contribution to the SHA256 stable
          # across rebuilds of the same content. (The xcframework's own
          # internal timestamps from xcodebuild are still variable, so
          # full bit-for-bit reproducibility requires SOURCE_DATE_EPOCH
          # plumbing — this is just the cheap defensive layer.)

          # Fat zip (CocoaPods)
          STAGE="dist/_stage"
          rm -rf "$STAGE" && mkdir -p "$STAGE"
          cp -R generated/PqcCore.xcframework "$STAGE/"
          cp generated/swift/pqc.swift "$STAGE/"
          cp LICENSE "$STAGE/"
          (cd "$STAGE" && TZ=UTC zip -X -r "../${ARCHIVE}" PqcCore.xcframework pqc.swift LICENSE)
          rm -rf "$STAGE"

          # Slim zip (SPM)
          STAGE_SPM="dist/_stage_spm"
          rm -rf "$STAGE_SPM" && mkdir -p "$STAGE_SPM"
          cp -R generated/PqcCore.xcframework "$STAGE_SPM/"
          (cd "$STAGE_SPM" && TZ=UTC zip -X -r "../${SPM_ARCHIVE}" PqcCore.xcframework)
          rm -rf "$STAGE_SPM"

          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV
          echo "SPM_ARCHIVE=${SPM_ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pqc-ios
          path: |
            dist/${{ env.ARCHIVE }}
            dist/${{ env.SPM_ARCHIVE }}
          if-no-files-found: error
          retention-days: 7

  attach-assets:
    name: attach-assets
    needs: [release-please, build-android, build-ios]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: pqc-android
          path: dist

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: pqc-ios
          path: dist

      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            dist/pqc-mobile-client-*-android.tar.gz \
            dist/PqcCore-*.zip \
            --repo "${{ github.repository }}" \
            --clobber

  publish-swiftpm:
    name: publish-swiftpm
    needs: [release-please, attach-assets]
    if: ${{ needs.release-please.outputs.release_created }}
    # macos-latest because Swift is preinstalled with Xcode. `swift
    # package compute-checksum` and `swift package dump-package` need
    # the toolchain. Public repos get unlimited macOS minutes so the
    # cost argument that originally motivated trying Linux doesn't
    # apply.
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main (for the template + last-release Package.swift)
        uses: actions/checkout@v4
        with:
          ref: main
          # fetch-depth: 0 so we can push back a tag-move below.
          fetch-depth: 0
          # Use the workflow token explicitly so the later git push has
          # write permission via the smart-protocol (REST API writes to
          # git/refs require additional scopes the default token may not
          # carry).
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Render Package.swift + Sources/PqcCore/pqc.swift from the release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          TAG="${{ needs.release-please.outputs.tag_name }}"
          STAGE="$(mktemp -d)"

          # Download both iOS zips:
          #   - PqcCore-X.Y.Z.zip: fat zip, used to extract pqc.swift
          #   - PqcCore-X.Y.Z.xcframework.zip: slim zip, what SPM's
          #     binaryTarget URL points at and what we checksum
          gh release download "$TAG" \
            -p "PqcCore-${VERSION}.zip" \
            -p "PqcCore-${VERSION}.xcframework.zip" \
            -D "$STAGE" \
            --repo "${{ github.repository }}"

          # SPM verifies the binaryTarget archive against this checksum
          # at resolve time. swift package compute-checksum is the
          # canonical tool. We checksum the SLIM zip, since that is
          # what SPM downloads.
          CHECKSUM="$(swift package compute-checksum "$STAGE/PqcCore-${VERSION}.xcframework.zip")"

          # Extract pqc.swift from the fat zip for placement under
          # Sources/PqcCore. SPM cannot extract arbitrary files out of
          # a binaryTarget archive, so the Swift binding has to live as
          # a real source file at the package's source root.
          unzip -j "$STAGE/PqcCore-${VERSION}.zip" pqc.swift -d "$STAGE/"

          # Render Package.swift from the template directly into the
          # working tree at the repo root, overwriting the previous
          # release's values.
          sed \
            -e "s|{{VERSION}}|${VERSION}|g" \
            -e "s|{{CHECKSUM}}|${CHECKSUM}|g" \
            .github/swiftpm-template/Package.swift.in \
            > Package.swift

          mkdir -p Sources/PqcCore
          cp "$STAGE/pqc.swift" Sources/PqcCore/pqc.swift

          # Fail fast if the rendered Package.swift is malformed. Runs
          # BEFORE we commit + force-move the tag.
          swift package --package-path . dump-package > /dev/null
          echo "Package.swift renders cleanly for $VERSION."

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Commit Package.swift + pqc.swift to main, re-point release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # If neither file changed (e.g., re-run of a release that
          # already pushed), --allow-empty makes the job safely
          # idempotent — the tag re-point still runs.
          git add Package.swift Sources/PqcCore/pqc.swift
          git commit --allow-empty -m "chore(release): swiftpm metadata for ${TAG} [skip ci]"

          # Push the commit. Branch protection on main may require this
          # to go via a PR, but for an automated workflow-token-authored
          # commit it usually is allowed (matching GitHub's default
          # "bot-author exemption" if the rule is configured).
          git push origin HEAD:main

          # Move the release tag from the release-please commit (where
          # Package.swift had the PREVIOUS version's checksum) to this
          # new commit (where Package.swift matches the just-uploaded
          # asset). Both commits are on main, so release-please's
          # tag-walk still finds the tag as an ancestor — the orphan
          # swiftpm-branch design that previously broke this anchor is
          # gone.
          git tag -f "$TAG"
          git push --force origin "$TAG"

  publish-maven:
    name: publish-maven
    # Depend on build-android so we can reuse its cargo-ndk output rather
    # than rebuilding from scratch. Failure isolation is preserved: a
    # Sonatype credential issue here doesn't affect the tarball that
    # attach-assets uploads, because build-android has already succeeded
    # before this job starts.
    needs: [release-please, build-android]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Pull the pre-built .so + Kotlin bindings from build-android.
      # Saves ~3 min per release vs re-running cargo-ndk here.
      - name: Download native + bindings from build-android
        uses: actions/download-artifact@v4
        with:
          name: pqc-android-native
          path: /tmp
      - name: Extract native + bindings
        run: tar -xzf /tmp/android-native.tar.gz

      # Pinned Gradle version so the build is reproducible. The repo
      # ships a wrapper at android/gradlew also pinned to 8.7 (see
      # android/gradle/wrapper/gradle-wrapper.properties). We still use
      # setup-gradle here for the action's caching/instrumentation, but
      # the actual gradle version is locked by the wrapper. Bump BOTH
      # in lockstep with android/build.gradle.kts's AGP + Kotlin plugin
      # versions.
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      # Sanity-check the GPG_SIGNING_KEY format BEFORE handing it to
      # Gradle. We've seen multiple "Could not read PGP secret key"
      # failures and need to know whether the secret is the documented
      # raw ASCII-armored format or accidentally base64 / corrupted.
      # The check inspects only the first line, never echoing the
      # actual key bytes. ::add-mask:: hides the line content from
      # logs even if it leaks.
      - name: Sanity-check GPG_SIGNING_KEY format
        env:
          KEY: ${{ secrets.GPG_SIGNING_KEY }}
        run: |
          first_line=$(printf '%s' "$KEY" | head -1)
          echo "::add-mask::$first_line"
          if [ "$first_line" = "-----BEGIN PGP PRIVATE KEY BLOCK-----" ]; then
            echo "OK: secret begins with PGP PRIVATE KEY BLOCK armor header."
          else
            # Don't echo the actual first line — print only its byte length
            # and a category hint without revealing content.
            len=$(printf '%s' "$first_line" | wc -c | tr -d ' ')
            echo "::warning::GPG_SIGNING_KEY first line is NOT '-----BEGIN PGP PRIVATE KEY BLOCK-----'."
            echo "::warning::First-line byte length: $len"
            if [ "$len" -gt 60 ] && [ "$len" -lt 80 ]; then
              echo "::warning::Length suggests this may be base64-wrapped content (76-col wrap default)."
            fi
            echo "::warning::Vanniktech 0.30 does not base64-decode; it passes the value verbatim to Gradle's useInMemoryPgpKeys which expects ASCII-armored."
            echo "::error::Re-export with: gpg --armor --export-secret-keys KEYID | gh secret set GPG_SIGNING_KEY"
            exit 1
          fi

      # Vanniktech's plugin reads credentials from these standard
      # ORG_GRADLE_PROJECT_* env vars. publishAndReleaseToMavenCentral
      # signs all artifacts with the in-memory GPG key, uploads them
      # to the Sonatype Central Portal staging repository, closes the
      # repository, and triggers automatic release once Sonatype's
      # validation passes — all in one task.
      # --stacktrace gives us the full exception chain on signing
      # failures so we can distinguish armor-parse errors from
      # passphrase-decryption errors.
      - name: Publish to Maven Central
        working-directory: android
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSWORD }}
        run: gradle publishAndReleaseToMavenCentral --no-configuration-cache --stacktrace

  publish-cocoapods:
    name: publish-cocoapods
    needs: [release-please, attach-assets]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Pin the CocoaPods version so a future runner-image bump can't
      # silently break the publish step. ~> 1.15 covers the modern
      # xcframework + :http source handling we rely on.
      - name: Pin CocoaPods version
        run: sudo gem install cocoapods -v '~> 1.15' --no-document

      - name: Verify trunk token is present
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        # Fail fast with a clear message rather than producing a
        # confusing mid-push 401 if the secret somehow wasn't propagated.
        run: |
          if [ -z "$COCOAPODS_TRUNK_TOKEN" ]; then
            echo "::error::COCOAPODS_TRUNK_TOKEN repo secret is not set; cannot push to Trunk."
            exit 1
          fi

      # The CocoaPods Trunk registry stores podspecs centrally so
      # consumers can write `pod 'PqcCore', '~> 0.2.0'` without the
      # long :podspec URL form. `pod trunk push` lints the podspec
      # against the live :http source (which by now has been uploaded
      # by attach-assets at the matching version tag), then registers
      # the spec under the authenticated session.
      #
      # ── IMPORTANT: this job REQUIRES the repo to be public. ──
      # Trunk's server-side lint downloads the :http asset to validate
      # the podspec; a private GitHub release returns 404 to
      # unauthenticated GETs and the push fails. Flip the repo public
      # before merging any release PR after this job lands.
      #
      # COCOAPODS_TRUNK_TOKEN: obtain once locally via
      #   `pod trunk register <email> '<name>'`
      # which mails a verification link; clicking it stores the token
      # in ~/.netrc under `machine trunk.cocoapods.org`. Copy that
      # password value into the COCOAPODS_TRUNK_TOKEN repo secret.
      - name: Publish podspec to CocoaPods Trunk
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          # --skip-import-validation skips the LOCAL xcodebuild compile
          # of a sample iOS project against the pod. Trunk's server runs
          # its own full lint on submission, so we don't lose
          # validation — just don't do it twice. Saves ~5-7 min/release.
          #
          # We deliberately do NOT pass --synchronous. The flag only
          # switches the client-side lint repo from the CDN-backed
          # TrunkSource to the canonical github.com/CocoaPods/Specs.git;
          # it doesn't add publish confirmation. Worse, in synchronous
          # mode the Trunk server makes an extra GitHub commit-API call
          # to record attribution AFTER the spec is already registered,
          # and a frequent timeout there has bitten us twice in a row
          # despite the spec being successfully published. See
          # research notes referencing CocoaPods/CocoaPods#12286 and
          # trunk.cocoapods.org pods_controller.rb verify_github_responses!
          set +e
          pod trunk push PqcCore.podspec \
            --allow-warnings \
            --skip-import-validation
          push_exit=$?
          set -e

          if [ $push_exit -eq 0 ]; then
            echo "::notice::pod trunk push completed cleanly."
            exit 0
          fi

          # pod trunk push exited non-zero. The most likely cause is the
          # cosmetic "GitHub commit API timed out" error that fires
          # AFTER the spec was already accepted server-side. Verify
          # against Trunk's API directly: if our version is registered,
          # the publish actually succeeded.
          echo "::warning::pod trunk push exited $push_exit — verifying via Trunk API..."
          for i in 1 2 3 4 5 6; do
            if curl -fsS "https://trunk.cocoapods.org/api/v1/pods/PqcCore" 2>/dev/null \
                 | grep -q "\"name\":\"${VERSION}\""; then
              echo "::notice::Trunk API confirms PqcCore ${VERSION} is registered. Treating as success."
              exit 0
            fi
            echo "Attempt $i: Trunk API does not yet show ${VERSION}. Waiting 10s..."
            sleep 10
          done

          echo "::error::pod trunk push exited $push_exit AND PqcCore ${VERSION} is not on Trunk after 60s of polling. Treat as a real failure."
          exit 1
