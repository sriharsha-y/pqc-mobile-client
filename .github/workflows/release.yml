name: release

# Conventional-commits driven release workflow using release-please.
#
# Flow:
#   1. Commit to main with conventional-commit subject lines:
#        feat(client): add HTTP/3 support       → bumps minor (pre-1.0: patch unless bump-minor-pre-major)
#        fix(tls): handle malformed pin         → bumps patch
#        chore: bump deps                       → no version bump
#        feat!: drop iOS 14 support             → bumps major (or minor in 0.x with bump-minor-pre-major)
#   2. release-please opens / updates a release PR ("chore: release X.Y.Z") that:
#        - bumps version in Cargo.toml
#        - updates CHANGELOG.md (grouped by Features / Bug Fixes / etc.)
#   3. Merge that release PR. release-please then:
#        - creates git tag vX.Y.Z
#        - creates a GitHub Release whose body is the CHANGELOG entries for this version
#   4. The build-android, build-ios, and attach-assets jobs run conditionally
#      on `release_created`, attaching the AAR + XCFramework archives to the
#      newly-created release.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize release runs so concurrent merges to main don't race on tag
# creation. Don't cancel an in-progress release — its mid-state might be
# a partially-published release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write       # release-please creates tags/releases
  pull-requests: write  # release-please opens release PRs

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name:        ${{ steps.rp.outputs.tag_name }}
      version:         ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          release-type: rust
          package-name: pqc_client
          # Treat 0.x.y like 1.x.y for the purpose of choosing bump levels —
          # feat: → 0.minor, fix: → 0.patch (rather than everything → patch).
          bump-minor-pre-major: true

  build-android:
    name: build-android
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + Android targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-android

      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk
        # uniffi-bindgen built from this crate's [[bin]] target.

      - name: Resolve NDK path
        run: echo "ANDROID_NDK_HOME=${ANDROID_NDK_LATEST_HOME}" >> $GITHUB_ENV

      - name: Build
        run: ./scripts/build-android.sh

      - name: Package
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          ARCHIVE="pqc-mobile-client-${VERSION}-android.tar.gz"
          mkdir -p dist
          tar -czf "dist/${ARCHIVE}" \
              -C target jniLibs \
              -C ../generated kotlin
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pqc-android
          path: dist/${{ env.ARCHIVE }}
          if-no-files-found: error
          retention-days: 7

  build-ios:
    name: build-ios
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + iOS targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add \
            aarch64-apple-ios \
            aarch64-apple-ios-sim \
            x86_64-apple-ios

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-ios

      # uniffi-bindgen built from this crate's [[bin]] target.

      - name: Build
        run: ./scripts/build-ios.sh

      - name: Package
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          ARCHIVE="pqc-mobile-client-${VERSION}-ios.zip"
          mkdir -p dist
          (cd generated && zip -r "../dist/${ARCHIVE}" PqcCore.xcframework swift)
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pqc-ios
          path: dist/${{ env.ARCHIVE }}
          if-no-files-found: error
          retention-days: 7

  attach-assets:
    name: attach-assets
    needs: [release-please, build-android, build-ios]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: pqc-android
          path: dist

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: pqc-ios
          path: dist

      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            dist/pqc-mobile-client-*-android.tar.gz \
            dist/pqc-mobile-client-*-ios.zip \
            --repo "${{ github.repository }}" \
            --clobber
