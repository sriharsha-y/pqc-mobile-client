name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + components)
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: check-${{ matrix.os }}

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Tests
        # Includes the smoke test against pq.cloudflareresearch.com.
        # If CF's PQ endpoint is down, mark this step as continue-on-error
        # rather than disable it; we want loud signal when negotiation breaks.
        run: cargo test --release --locked -- --nocapture
