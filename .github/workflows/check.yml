name: check

# Runs on PRs targeting main, on push to main, and manually.
#
# The PR run already validates the merge result (this repo merges via merge
# commits), so the push:main run is largely redundant. We keep it anyway so
# the README `check` badge reflects a real main-branch status — a status
# badge can only track a branch the workflow actually runs on — and as a
# safety net for anything that lands on main outside the PR flow.
#
# workflow_dispatch gives the Actions tab a manual button in case CF's PQ
# endpoint blips and you want to re-verify without pushing.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    # macOS minutes count 10× against the GitHub free quota, and ios.yml
    # already exercises the macOS + aws-lc-sys + iOS-target toolchain.
    # Linux is enough here.
    name: check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + components)
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: check-ubuntu

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Tests
        # Includes the smoke test against pq.cloudflareresearch.com. If CF's
        # PQ endpoint is down, re-run via workflow_dispatch; we want loud
        # signal when negotiation breaks rather than silently green.
        # Tests confirm the negotiated KEX via the server's /cdn-cgi/trace
        # report, so they hold no shared client state and run in parallel.
        run: cargo test --release --locked -- --nocapture

  # Security + supply-chain checks: cargo-audit scans the locked dep tree
  # against the RustSec advisory database; cargo-deny enforces the license
  # / banned-crate / source-registry policy in deny.toml.
  # Both tools install as pre-built binaries (taiki-e/install-action) —
  # much faster than `cargo install` from source.
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny
      - name: cargo audit (RustSec advisory scan)
        run: cargo audit --deny warnings
      - name: cargo deny (licenses + bans + sources)
        run: cargo deny check
