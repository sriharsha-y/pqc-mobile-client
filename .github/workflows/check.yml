name: check

# Runs on PRs to main, push to main, and manually. The push:main run is
# mostly redundant with the PR run but keeps the README `check` badge
# tracking a real branch. workflow_dispatch allows a manual re-run if CF's
# PQ endpoint blips.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    # Linux suffices (macOS minutes cost 10×; ios.yml covers the macOS path).
    name: check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + components)
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: check-ubuntu

      # Steps call the Makefile so local `make check` and CI stay identical.
      - name: Format check
        run: make fmt-check

      - name: Clippy
        run: make clippy

      - name: Tests
        # Includes the network smoke test (pq.cloudflareresearch.com); re-run
        # via workflow_dispatch if CF's PQ endpoint blips.
        run: make test

  # Supply-chain: cargo-audit (RustSec advisories) + cargo-deny (license/
  # bans/sources policy in deny.toml). Installed as prebuilt binaries.
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny
      - name: Audit (cargo-audit + cargo-deny)
        run: make audit
