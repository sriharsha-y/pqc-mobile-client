name: android

# Manual-only. The Android cross-compile pipeline is expensive enough
# (~6 ubuntu-minutes including cargo-ndk install) that we don't run it
# on every PR — `check.yml` (which includes cargo audit + cargo deny)
# covers fmt / clippy / unit + smoke tests on every PR, and release.yml
# builds Android artifacts when a release is cut.
#
# Click "Run workflow" on the Actions tab before merging any PR that
# touches the Rust core, build scripts, or NDK-relevant config.
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build-aar
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + Android targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: android

      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk
        # uniffi-bindgen is built as a binary target from this crate
        # (see Cargo.toml [[bin]]); the build script invokes it via
        # `cargo run --release --bin uniffi-bindgen`.

      - name: Resolve NDK path
        run: echo "ANDROID_NDK_HOME=${ANDROID_NDK_LATEST_HOME}" >> $GITHUB_ENV

      - name: Build native libraries + Kotlin bindings
        run: ./scripts/build-android.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pqc-android
          path: |
            target/jniLibs/
            generated/kotlin/
          if-no-files-found: error
          retention-days: 14
