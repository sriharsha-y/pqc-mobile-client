name: android

# Manual-only. The Android cross-compile pipeline is expensive enough
# (~6 ubuntu-minutes including cargo-ndk install) that we don't run it
# on every PR — `check.yml` (which includes cargo audit + cargo deny)
# covers fmt / clippy / unit + smoke tests on every PR, and release.yml
# builds Android artifacts when a release is cut.
#
# Click "Run workflow" on the Actions tab before merging any PR that
# touches the Rust core, build scripts, or NDK-relevant config.
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build-aar
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + Android targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: android

      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk
        # uniffi-bindgen is built as a binary target from this crate
        # (see Cargo.toml [[bin]]); the build script invokes it via
        # `cargo run --release --bin uniffi-bindgen`.

      - name: Resolve NDK path
        run: echo "ANDROID_NDK_HOME=${ANDROID_NDK_LATEST_HOME}" >> $GITHUB_ENV

      - name: Build native libraries + Kotlin bindings
        run: ./scripts/build-android.sh

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Assemble the actual AAR via the wrapper so we can assert what
      # ends up inside it. Without this step, a regression that drops
      # the fat-AAR `api(fileTree("libs"))` wiring would only surface
      # post-Maven-Central-publish as a downstream NoClassDefFoundError.
      - name: Assemble AAR
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      # Fat-AAR contract assertion: the published AAR MUST embed
      # rustls-platform-verifier's classes.jar under libs/ — without it
      # consumers crash at first TLS handshake with
      #   NoClassDefFoundError: org.rustls.platformverifier.CertificateVerifier
      # See android/build.gradle.kts (api(fileTree("libs"))) +
      # scripts/build-android.sh (jar extraction).
      - name: Assert fat-AAR bundles rustls-platform-verifier
        run: |
          AAR=android/build/outputs/aar/pqc-mobile-client-release.aar
          if [ ! -f "$AAR" ]; then
            echo "::error::Expected AAR at $AAR"
            exit 1
          fi
          if ! unzip -l "$AAR" | grep -qE 'libs/rustls-platform-verifier-[0-9.]+\.jar'; then
            echo "::error::$AAR is missing libs/rustls-platform-verifier-*.jar."
            echo "::error::Audit android/build.gradle.kts's api(fileTree(\"libs\")) and scripts/build-android.sh's extraction step."
            unzip -l "$AAR"
            exit 1
          fi
          echo "OK: AAR contains the bundled rustls-platform-verifier jar."

      # Bindings contract assertion: the AAR's classes.jar MUST contain
      # the UniFFI-generated Kotlin API, not just the hand-written
      # PqcAndroidInit glue (which lives in git and is always present).
      # The uniffi-rs#2520 strip bug made `uniffi-bindgen --library` emit
      # zero bindings on Linux silently, shipping an AAR with no
      # PqcHttpClient/PqcConfig — unusable by consumers yet passing every
      # other check. See scripts/build-android.sh's strip note + guard.
      - name: Assert AAR contains the UniFFI Kotlin bindings
        run: |
          AAR=android/build/outputs/aar/pqc-mobile-client-release.aar
          unzip -p "$AAR" classes.jar > /tmp/aar-classes.jar
          if ! unzip -l /tmp/aar-classes.jar | grep -q 'io/github/sriharsha_y/pqc/PqcHttpClient\.class'; then
            echo "::error::$AAR classes.jar is missing io/github/sriharsha_y/pqc/PqcHttpClient.class."
            echo "::error::uniffi-bindgen generated zero bindings — see the uniffi-rs#2520 strip note in scripts/build-android.sh."
            unzip -l /tmp/aar-classes.jar
            exit 1
          fi
          echo "OK: AAR classes.jar carries the UniFFI Kotlin bindings."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pqc-android
          path: |
            target/jniLibs/
            generated/kotlin/
            android/build/outputs/aar/
          if-no-files-found: error
          retention-days: 14
