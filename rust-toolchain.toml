[toolchain]
# Tracks the latest stable Rust. Pin to a specific version (e.g. "1.95")
# if reproducibility-across-machines becomes a concern.
channel = "stable"
components = ["rustfmt", "clippy"]
targets = [
    # Android
    "aarch64-linux-android",
    "armv7-linux-androideabi",
    "x86_64-linux-android",
    "i686-linux-android",
    # iOS
    "aarch64-apple-ios",
    "aarch64-apple-ios-sim",
    "x86_64-apple-ios",
]
profile = "minimal"
